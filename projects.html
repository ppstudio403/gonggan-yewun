<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공간여운 — 프로젝트 관리</title>
  <script>
    (function () {
      if (!localStorage.getItem('ppstudio_user')) window.location.replace('login.html');
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f5f3f0;
      --surface:       #ffffff;
      --sidebar:       #1c1917;
      --sidebar-hover: #292524;
      --accent:        #b5945a;
      --accent-light:  #d4b483;
      --accent-pale:   #f5ead8;
      --text:          #1c1917;
      --text-sub:      #78716c;
      --text-muted:    #a8a29e;
      --border:        #e7e5e4;
      --shadow-sm:     0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --radius:        12px;
      --radius-sm:     8px;
    }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ══ HEADER ══ */
    .header {
      background: var(--sidebar);
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #292524;
    }

    .header-brand { display: flex; align-items: center; gap: 12px; }

    .header-logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff; flex-shrink: 0;
    }

    .header-brand-name { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
    .header-brand-name span { color: var(--accent-light); }
    .header-sep { flex: 1; }
    .header-date { font-size: 13px; color: #57534e; }
    .header-user { display: flex; align-items: center; gap: 10px; }

    .header-avatar {
      width: 34px; height: 34px;
      background: var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }

    .header-user-name { font-size: 14px; font-weight: 600; color: #e7e5e4; }

    .btn-logout {
      padding: 7px 16px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius-sm);
      color: #a8a29e; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .15s, color .15s;
    }
    .btn-logout:hover { background: rgba(255,255,255,.13); color: #e7e5e4; }

    /* ══ LAYOUT ══ */
    .layout { display: flex; flex: 1; min-height: 0; }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: 220px;
      background: var(--sidebar);
      display: flex; flex-direction: column; flex-shrink: 0;
      position: sticky; top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
      border-right: 1px solid #292524;
    }

    .sidebar-nav { flex: 1; padding: 16px 10px; display: flex; flex-direction: column; gap: 2px; }

    .nav-section-label {
      font-size: 10px; font-weight: 600; color: #57534e;
      letter-spacing: 1px; text-transform: uppercase;
      padding: 12px 12px 6px; margin-top: 4px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: var(--radius-sm);
      cursor: pointer; transition: background .15s, color .15s;
      color: #a8a29e; font-size: 13.5px; font-weight: 500;
      border: none; background: none; width: 100%;
      text-align: left; text-decoration: none;
    }
    .nav-item:hover  { background: var(--sidebar-hover); color: #e7e5e4; }
    .nav-item.active { background: rgba(181,148,90,.15); color: var(--accent-light); }
    .nav-icon { font-size: 16px; flex-shrink: 0; }

    /* ══ MAIN ══ */
    .main { flex: 1; min-width: 0; overflow-y: auto; }

    .content {
      padding: 32px;
      display: flex; flex-direction: column; gap: 28px;
      max-width: 1200px;
    }

    /* ══ TOOLBAR ══ */
    .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .page-title {
      font-size: 22px; font-weight: 700; color: var(--text);
      letter-spacing: -.3px; margin-right: 6px;
    }

    .year-tabs { display: flex; gap: 4px; }

    .year-tab {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-sub);
      font-size: 13.5px; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .year-tab:hover  { border-color: var(--accent); color: var(--accent); }
    .year-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .toolbar-sep { flex: 1; }

    .btn-new {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 20px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: 13.5px; font-weight: 700;
      cursor: pointer; transition: background .15s;
      white-space: nowrap;
    }
    .btn-new:hover { background: #a07d44; }

    /* ══ MONTH SECTION ══ */
    .month-sections { display: flex; flex-direction: column; gap: 36px; }

    .month-section { display: flex; flex-direction: column; gap: 14px; }

    .month-header { display: flex; align-items: center; gap: 14px; }

    .month-title { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; }

    .month-line { flex: 1; height: 1.5px; background: var(--border); }

    .month-count { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

    /* ══ CARD GRID ══ */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    /* ══ PROJECT CARD ══ */
    .proj-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s, transform .12s;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .proj-card:hover {
      border-color: var(--accent);
      box-shadow: 0 6px 20px rgba(181,148,90,.15);
      transform: translateY(-2px);
    }
    .proj-card:active { transform: translateY(0); }

    .card-top {
      padding: 16px 18px 14px;
      display: flex; flex-direction: column; gap: 8px;
      flex: 1;
    }

    .card-row1 {
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
    }

    .stage-badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11.5px; font-weight: 700;
      white-space: nowrap; flex-shrink: 0;
    }

    .dday-badge {
      font-size: 11.5px; font-weight: 700;
      padding: 3px 9px; border-radius: 20px;
      white-space: nowrap; flex-shrink: 0;
    }
    .dday-future { background: var(--accent-pale); color: var(--accent); }
    .dday-today  { background: #fef3c7; color: #d97706; }
    .dday-past   { background: #f0fdf4; color: #16a34a; }

    .card-name {
      font-size: 15px; font-weight: 700;
      color: var(--text); line-height: 1.35;
    }

    .card-client { font-size: 12.5px; color: var(--text-sub); }

    .card-bottom {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
      background: #faf9f8;
    }

    .card-designer {
      font-size: 12.5px; color: var(--text-sub);
      display: flex; align-items: center; gap: 5px;
    }

    .card-amount { font-size: 13px; font-weight: 700; color: var(--accent); }

    /* ══ EMPTY STATE ══ */
    .empty-year {
      text-align: center; padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-year-icon { font-size: 44px; margin-bottom: 16px; }
    .empty-year-text { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--text-sub); }
    .empty-year-sub  { font-size: 13px; }

    /* ══ MODAL ══ */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: var(--radius);
      width: 100%; max-width: 540px;
      max-height: 92vh;
      display: flex; flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,.22);
      overflow: hidden;
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .modal-title { font-size: 17px; font-weight: 700; color: var(--text); }

    .modal-close {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: none; border-radius: 8px;
      color: var(--text-muted); font-size: 15px;
      cursor: pointer; transition: background .15s, color .15s;
    }
    .modal-close:hover { background: var(--bg); color: var(--text); }

    .modal-body {
      padding: 24px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 14px;
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-full { grid-column: 1 / -1; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }

    .form-label { font-size: 12.5px; font-weight: 600; color: var(--text); }
    .form-label .req { color: #dc2626; margin-left: 2px; }

    .form-input, .form-select {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13.5px; color: var(--text);
      background: var(--bg); outline: none;
      transition: border-color .2s, box-shadow .2s;
      font-family: inherit; width: 100%;
    }
    .form-input:focus, .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(181,148,90,.1);
      background: #fff;
    }
    .form-input::placeholder { color: var(--text-muted); }

    .form-error {
      font-size: 12.5px; color: #dc2626;
      background: #fff1f2; border: 1px solid #fecaca;
      padding: 8px 12px; border-radius: var(--radius-sm);
      display: none;
    }
    .form-error.visible { display: block; }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 10px;
      flex-shrink: 0;
    }

    .btn-cancel {
      padding: 10px 20px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface); color: var(--text-sub);
      font-size: 13.5px; font-weight: 600;
      cursor: pointer; transition: background .15s;
      font-family: inherit;
    }
    .btn-cancel:hover { background: var(--bg); }

    .btn-save {
      padding: 10px 24px;
      border: none; border-radius: var(--radius-sm);
      background: var(--accent); color: #fff;
      font-size: 13.5px; font-weight: 700;
      cursor: pointer; transition: background .15s;
      font-family: inherit;
    }
    .btn-save:hover { background: #a07d44; }

    /* ══ BOTTOM NAV ══ */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: #1c1917;
      border-top: 1px solid #292524;
      z-index: 500;
      flex-direction: row;
      align-items: stretch;
    }
    .bnav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: #78716c;
      text-decoration: none;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      font-family: inherit;
      transition: color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .bnav-item.active { color: #d4b483; }
    .bnav-item:hover { color: #a8a29e; }
    .bnav-icon { font-size: 20px; line-height: 1; }
    .bnav-label { font-size: 10px; font-weight: 600; }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 1000px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }

    @media (max-width: 768px) {
      .bottom-nav { display: flex; }
      .sidebar { display: none !important; }
      .main { padding-bottom: 64px; }
      .content { padding: 16px !important; }
      .header { padding: 0 16px; height: 52px; }
      .header-brand-name { font-size: 16px; }
      .header-date { display: none; }
      .header-user-name { display: none; }
      .btn-logout { padding: 6px 12px; font-size: 12px; }
      .year-tabs { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; }
      .proj-grid { grid-template-columns: 1fr !important; }
      .toolbar { flex-wrap: wrap; gap: 8px; }
      .toolbar .btn-new { width: 100%; justify-content: center; }
      .page-title { font-size: 18px; }
      .card-grid { grid-template-columns: 1fr !important; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ══ HEADER ══ -->
  <header class="header">
    <div class="header-brand">
      <div class="header-logo">GY</div>
      <div class="header-brand-name">공간<span>여운</span></div>
    </div>
    <div class="header-sep"></div>
    <div class="header-date" id="header-date"></div>
    <div class="header-user">
      <div class="header-avatar" id="user-avatar">관</div>
      <div class="header-user-name" id="user-name">관리자</div>
      <button class="btn-logout" id="logout-btn">로그아웃</button>
    </div>
  </header>

  <div class="layout">

    <!-- ══ SIDEBAR ══ -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <div class="nav-section-label">업무</div>
        <a class="nav-item" href="dashboard.html">
          <span class="nav-icon">🏠</span> 대시보드
        </a>
        <a class="nav-item active" href="projects.html">
          <span class="nav-icon">🏗️</span> 프로젝트 관리
        </a>
        <a class="nav-item" href="consultation.html">
          <span class="nav-icon">📝</span> 회의록
        </a>
        <a class="nav-item" href="orders.html">
          <span class="nav-icon">📦</span> 발주서
        </a>
        <a class="nav-item" href="schedule.html">
          <span class="nav-icon">🗓️</span> 일정
        </a>
        <div class="nav-section-label">시스템</div>
        <a class="nav-item" href="settings.html"><span class="nav-icon">⚙️</span> 설정</a>
      </nav>
    </aside>

    <!-- ══ MAIN ══ -->
    <main class="main">
      <div class="content">

        <!-- TOOLBAR -->
        <div class="toolbar">
          <span class="page-title">프로젝트 관리</span>
          <div class="year-tabs" id="year-tabs">
            <button class="year-tab" data-year="2024">2024</button>
            <button class="year-tab" data-year="2025">2025</button>
            <button class="year-tab active" data-year="2026">2026</button>
          </div>
          <div class="toolbar-sep"></div>
          <button class="btn-new" id="btn-new-project">＋ 새 프로젝트</button>
        </div>

        <!-- MONTH SECTIONS (JS render) -->
        <div class="month-sections" id="month-sections"></div>

      </div>
    </main>

  </div>

  <!-- ══ MODAL ══ -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">새 프로젝트 등록</div>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <div class="form-group form-full">
            <label class="form-label">현장명 <span class="req">*</span></label>
            <input class="form-input" id="f-name" placeholder="예: 강남 카페 인테리어" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">고객명 <span class="req">*</span></label>
            <input class="form-input" id="f-client" placeholder="고객 이름" />
          </div>
          <div class="form-group">
            <label class="form-label">현재 단계 <span class="req">*</span></label>
            <select class="form-select" id="f-stage">
              <option value="문의">문의</option>
              <option value="1차상담">1차상담</option>
              <option value="현장방문/실측">현장방문/실측</option>
              <option value="가견적">가견적</option>
              <option value="계약">계약</option>
              <option value="발주">발주</option>
              <option value="시공">시공</option>
              <option value="준공">준공</option>
              <option value="AS">AS</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">담당 디자이너</label>
            <input class="form-input" id="f-designer" placeholder="이름" />
          </div>
          <div class="form-group">
            <label class="form-label">계약금액 (만원)</label>
            <input class="form-input" id="f-amount" type="number" placeholder="미정이면 비워두세요" min="0" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">문의 시작일 <span class="req">*</span></label>
            <input class="form-input" id="f-inquiry-date" type="date" />
          </div>
          <div class="form-group">
            <label class="form-label">시공 시작일</label>
            <input class="form-input" id="f-start-date" type="date" />
          </div>
        </div>
        <div class="form-error" id="form-error">현장명, 고객명, 문의 시작일은 필수 입력입니다.</div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btn-cancel">취소</button>
        <button class="btn-save" id="btn-save">저장</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a class="bnav-item" href="dashboard.html"><span class="bnav-icon">🏠</span><span class="bnav-label">홈</span></a>
    <a class="bnav-item active" href="projects.html"><span class="bnav-icon">🏗️</span><span class="bnav-label">프로젝트</span></a>
    <a class="bnav-item" href="consultation.html"><span class="bnav-icon">📝</span><span class="bnav-label">회의록</span></a>
    <a class="bnav-item" href="orders.html"><span class="bnav-icon">📦</span><span class="bnav-label">발주서</span></a>
    <a class="bnav-item" href="schedule.html"><span class="bnav-icon">🗓️</span><span class="bnav-label">일정</span></a>
    <a class="bnav-item" href="settings.html"><span class="bnav-icon">☰</span><span class="bnav-label">설정</span></a>
  </nav>

  <script>
    /* ── 인증 ── */
    const user = JSON.parse(localStorage.getItem('ppstudio_user') || 'null');
    if (!user) window.location.replace('login.html');

    /* ── 사용자 정보 ── */
    document.getElementById('user-name').textContent   = user.name;
    document.getElementById('user-avatar').textContent = user.name.charAt(0);
    document.getElementById('header-date').textContent =
      new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });

    document.getElementById('logout-btn').addEventListener('click', function () {
      localStorage.removeItem('ppstudio_user');
      window.location.href = 'login.html';
    });

    /* ── 단계 설정 ── */
    const DDAY_STAGES = new Set(['계약', '발주', '시공', '준공', 'AS']);

    const STAGE_STYLE = {
      '문의':          { bg: '#f1f5f9', color: '#64748b' },
      '1차상담':       { bg: '#eff6ff', color: '#3b82f6' },
      '현장방문/실측': { bg: '#eef2ff', color: '#6366f1' },
      '가견적':        { bg: '#fffbeb', color: '#d97706' },
      '계약':          { bg: '#fff7ed', color: '#ea580c' },
      '발주':          { bg: '#faf5ff', color: '#9333ea' },
      '시공':          { bg: '#dbeafe', color: '#1d4ed8' },
      '준공':          { bg: '#f0fdf4', color: '#16a34a' },
      'AS':            { bg: '#fff1f2', color: '#dc2626' },
    };

    const MONTH_LABELS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

    /* ── 초기 더미 데이터 ── */
    const INIT_PROJECTS = [
      {
        id: 'proj-001',
        name: '강남 카페 인테리어',
        client: '김민수',
        stage: '시공',
        designer: '이지연',
        amount: 1800,
        startDate: '2026-07-01',
        inquiryDate: '2026-01-10',
      },
      {
        id: 'proj-002',
        name: '마포 사무실 리모델링',
        client: '박철수',
        stage: '발주',
        designer: '최수진',
        amount: 2400,
        startDate: '2026-07-15',
        inquiryDate: '2026-02-05',
      },
      {
        id: 'proj-003',
        name: '서초 주거 풀패키지',
        client: '이영희',
        stage: '가견적',
        designer: '이지연',
        amount: null,
        startDate: null,
        inquiryDate: '2026-04-20',
      },
      {
        id: 'proj-004',
        name: '용산 레스토랑 설계',
        client: '정상욱',
        stage: '1차상담',
        designer: '최수진',
        amount: null,
        startDate: null,
        inquiryDate: '2026-05-08',
      },
    ];

    /* ── localStorage ── */
    function loadProjects() {
      const raw = localStorage.getItem('ppstudio_projects');
      if (!raw) {
        saveProjects(INIT_PROJECTS);
        return INIT_PROJECTS.slice();
      }
      return JSON.parse(raw);
    }

    function saveProjects(list) {
      localStorage.setItem('ppstudio_projects', JSON.stringify(list));
    }

    /* ── D-day 계산 ── */
    function getDday(startDate, stage) {
      if (!startDate || !DDAY_STAGES.has(stage)) return null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const start = new Date(startDate);
      start.setHours(0, 0, 0, 0);
      const diff = Math.round((start - today) / 86400000);
      if (diff > 0)  return { text: 'D-' + diff,           cls: 'dday-future' };
      if (diff === 0) return { text: 'D-Day',              cls: 'dday-today'  };
      return           { text: 'D+' + Math.abs(diff),      cls: 'dday-past'   };
    }

    /* ── 카드 HTML ── */
    function renderCard(p) {
      const s    = STAGE_STYLE[p.stage] || { bg: '#f1f5f9', color: '#64748b' };
      const dday = getDday(p.startDate, p.stage);

      const ddayHtml = dday
        ? `<span class="dday-badge ${dday.cls}">${dday.text}</span>`
        : '';

      const amountHtml = p.amount != null
        ? `<span class="card-amount">${Number(p.amount).toLocaleString()}만원</span>`
        : `<span class="card-amount" style="color:var(--text-muted)">금액 미정</span>`;

      const designerHtml = p.designer
        ? `<span class="card-designer">👤 ${p.designer}</span>`
        : `<span class="card-designer" style="color:var(--text-muted)">미배정</span>`;

      return `
        <div class="proj-card" data-id="${p.id}">
          <div class="card-top">
            <div class="card-row1">
              <span class="stage-badge" style="background:${s.bg};color:${s.color};">${p.stage}</span>
              ${ddayHtml}
            </div>
            <div class="card-name">${p.name}</div>
            <div class="card-client">고객 · ${p.client}</div>
          </div>
          <div class="card-bottom">
            ${designerHtml}
            ${amountHtml}
          </div>
        </div>`;
    }

    /* ── 월별 렌더 ── */
    let selectedYear = 2026;

    function render() {
      const projects  = loadProjects();
      const container = document.getElementById('month-sections');

      const yearProjects = projects.filter(p =>
        p.inquiryDate && new Date(p.inquiryDate).getFullYear() === selectedYear
      );

      if (yearProjects.length === 0) {
        container.innerHTML = `
          <div class="empty-year">
            <div class="empty-year-icon">📋</div>
            <div class="empty-year-text">${selectedYear}년 프로젝트가 없습니다</div>
            <div class="empty-year-sub">＋ 새 프로젝트 버튼으로 등록해보세요</div>
          </div>`;
        return;
      }

      /* 월별 그룹핑 */
      const byMonth = {};
      yearProjects.forEach(p => {
        const m = new Date(p.inquiryDate).getMonth() + 1;
        (byMonth[m] = byMonth[m] || []).push(p);
      });

      let html = '';
      for (let m = 1; m <= 12; m++) {
        if (!byMonth[m]) continue;
        const list = byMonth[m];
        html += `
          <div class="month-section">
            <div class="month-header">
              <div class="month-title">${MONTH_LABELS[m - 1]}</div>
              <div class="month-line"></div>
              <div class="month-count">${list.length}건</div>
            </div>
            <div class="card-grid">
              ${list.map(renderCard).join('')}
            </div>
          </div>`;
      }

      container.innerHTML = html;

      /* 카드 클릭 → 상세 페이지 */
      container.querySelectorAll('.proj-card').forEach(card => {
        card.addEventListener('click', function () {
          window.location.href = 'project-detail.html?id=' + this.dataset.id;
        });
      });
    }

    /* ── 연도 탭 ── */
    document.getElementById('year-tabs').addEventListener('click', function (e) {
      const btn = e.target.closest('.year-tab');
      if (!btn) return;
      document.querySelectorAll('.year-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedYear = parseInt(btn.dataset.year, 10);
      render();
    });

    /* ── 모달 ── */
    const overlay   = document.getElementById('modal-overlay');
    const formError = document.getElementById('form-error');

    function openModal() {
      ['f-name', 'f-client', 'f-designer', 'f-amount', 'f-start-date'].forEach(id => {
        document.getElementById(id).value = '';
      });
      document.getElementById('f-stage').value        = '문의';
      document.getElementById('f-inquiry-date').value = new Date().toISOString().slice(0, 10);
      formError.classList.remove('visible');
      overlay.classList.add('open');
      document.getElementById('f-name').focus();
    }

    function closeModal() { overlay.classList.remove('open'); }

    document.getElementById('btn-new-project').addEventListener('click', openModal);
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    overlay.addEventListener('click', function (e) { if (e.target === overlay) closeModal(); });

    /* ESC로 닫기 */
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal();
    });

    document.getElementById('btn-save').addEventListener('click', function () {
      const name        = document.getElementById('f-name').value.trim();
      const client      = document.getElementById('f-client').value.trim();
      const stage       = document.getElementById('f-stage').value;
      const designer    = document.getElementById('f-designer').value.trim();
      const amountRaw   = document.getElementById('f-amount').value;
      const inquiryDate = document.getElementById('f-inquiry-date').value;
      const startDate   = document.getElementById('f-start-date').value;

      if (!name || !client || !inquiryDate) {
        formError.classList.add('visible');
        return;
      }

      const projects = loadProjects();
      projects.push({
        id:          'proj-' + Date.now(),
        name,
        client,
        stage,
        designer:    designer  || null,
        amount:      amountRaw ? parseInt(amountRaw, 10) : null,
        startDate:   startDate || null,
        inquiryDate,
      });
      saveProjects(projects);

      /* 등록한 프로젝트의 연도로 탭 전환 */
      const newYear = new Date(inquiryDate).getFullYear();
      if (newYear !== selectedYear) {
        selectedYear = newYear;
        document.querySelectorAll('.year-tab').forEach(b => {
          b.classList.toggle('active', parseInt(b.dataset.year, 10) === selectedYear);
        });
      }

      closeModal();
      render();
    });

    /* ── 초기 렌더 ── */
    render();
  </script>

</body>
</html>
