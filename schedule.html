<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공간여운 — 일정</title>
  <script>
    (function () {
      if (!localStorage.getItem('ppstudio_user')) window.location.replace('login.html');
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f5f3f0;
      --surface:       #ffffff;
      --sidebar:       #1c1917;
      --sidebar-hover: #292524;
      --accent:        #b5945a;
      --accent-light:  #d4b483;
      --accent-pale:   #f5ead8;
      --text:          #1c1917;
      --text-sub:      #78716c;
      --text-muted:    #a8a29e;
      --border:        #e7e5e4;
      --shadow-sm:     0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow:        0 4px 16px rgba(0,0,0,.12);
      --radius:        12px;
      --radius-sm:     8px;
    }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden;
    }

    /* ══ HEADER ══ */
    .header {
      background: var(--sidebar); height: 64px;
      display: flex; align-items: center; padding: 0 28px; gap: 16px;
      flex-shrink: 0; position: sticky; top: 0; z-index: 100;
      border-bottom: 1px solid #292524;
    }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .header-logo {
      width: 36px; height: 36px; background: var(--accent); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .header-brand-name { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
    .header-brand-name span { color: var(--accent-light); }
    .header-sep { flex: 1; }
    .header-date { font-size: 13px; color: #57534e; }
    .header-user { display: flex; align-items: center; gap: 10px; }
    .header-avatar {
      width: 34px; height: 34px; background: var(--accent); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .header-user-name { font-size: 14px; font-weight: 600; color: #e7e5e4; }
    .btn-logout {
      padding: 7px 16px; background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12); border-radius: var(--radius-sm);
      color: #a8a29e; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .15s, color .15s;
    }
    .btn-logout:hover { background: rgba(255,255,255,.13); color: #e7e5e4; }

    /* ══ LAYOUT ══ */
    .layout { display: flex; flex: 1; min-height: 0; }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: 220px; background: var(--sidebar);
      display: flex; flex-direction: column; flex-shrink: 0;
      position: sticky; top: 64px; height: calc(100vh - 64px);
      overflow-y: auto; border-right: 1px solid #292524;
    }
    .sidebar-nav { flex: 1; padding: 16px 10px; display: flex; flex-direction: column; gap: 2px; }
    .nav-section-label {
      font-size: 10px; font-weight: 600; color: #57534e;
      letter-spacing: 1px; text-transform: uppercase; padding: 12px 12px 6px; margin-top: 4px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      border-radius: var(--radius-sm); cursor: pointer; transition: background .15s, color .15s;
      color: #a8a29e; font-size: 13.5px; font-weight: 500;
      border: none; background: none; width: 100%; text-align: left; text-decoration: none;
    }
    .nav-item:hover { background: var(--sidebar-hover); color: #e7e5e4; }
    .nav-item.active { background: rgba(181,148,90,.15); color: var(--accent-light); }
    .nav-icon { font-size: 16px; flex-shrink: 0; }

    /* ══ MAIN ══ */
    .main { flex: 1; min-width: 0; overflow-y: auto; }
    .content { padding: 32px; display: flex; flex-direction: column; gap: 20px; }

    /* PAGE HEADER */
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
    .page-title-block { display: flex; flex-direction: column; gap: 4px; }
    .page-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
    .page-sub { font-size: 13px; color: var(--text-muted); }
    .btn-add {
      display: flex; align-items: center; gap: 8px; padding: 10px 20px;
      background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap;
      transition: background .15s; flex-shrink: 0;
    }
    .btn-add:hover { background: #a07d44; }

    /* ══ TAB BAR ══ */
    .tab-bar { display: flex; gap: 6px; }
    .tab-btn {
      padding: 10px 22px; border-radius: var(--radius-sm);
      border: 1.5px solid var(--border); background: var(--surface);
      font-size: 14px; font-weight: 600; color: var(--text-sub);
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .tab-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ══ CALENDAR CARD ══ */
    .cal-card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); box-shadow: var(--shadow-sm);
    }

    /* Cal nav bar */
    .cal-nav {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px; border-bottom: 1px solid var(--border);
    }
    .cal-nav-title { font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -.3px; flex: 1; }
    .cal-nav-btn {
      width: 34px; height: 34px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 17px; transition: border-color .15s, background .15s;
    }
    .cal-nav-btn:hover { border-color: var(--accent); background: var(--accent-pale); }

    /* ── Calendar body: calendar + side panel ── */
    .cal-body {
      display: flex; overflow: hidden;
      border-radius: 0 0 var(--radius) var(--radius);
    }

    /* ── Monthly grid ── */
    #view-month { flex: 1; min-width: 0; }

    .month-dow-row { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--border); }
    .month-dow { padding: 10px 0; text-align: center; font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .month-week { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--border); }
    .month-week:last-child { border-bottom: none; }

    .month-cell {
      min-height: 100px; padding: 8px 10px 6px; border-right: 1px solid var(--border);
      cursor: pointer; transition: background .12s; display: flex; flex-direction: column; gap: 3px;
    }
    .month-cell:last-child { border-right: none; }
    .month-cell:hover { background: #faf9f7; }
    .month-cell.other-month .cell-date { color: var(--text-muted); opacity: .4; }
    .month-cell.is-sun .cell-date { color: #60a5fa; }
    .month-cell.is-sat .cell-date { color: #94a3b8; }
    .month-cell.today { background: #fef9f2; }
    .month-cell.today .cell-date { background: var(--accent); color: #fff !important; border-radius: 50%; }
    .month-cell.panel-active { background: #f0f4ff; }

    .cell-date {
      width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; border-radius: 50%; flex-shrink: 0; align-self: flex-start;
    }
    .cell-events { display: flex; flex-direction: column; gap: 2px; flex: 1; }

    .cell-chip {
      padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
    }
    .cell-more { font-size: 11px; color: var(--text-muted); padding: 0 4px; font-weight: 500; }

    /* ══ SIDE PANEL ══ */
    .side-panel {
      width: 0; flex-shrink: 0; overflow: hidden;
      transition: width .28s cubic-bezier(.4, 0, .2, 1);
    }
    .side-panel.open {
      width: 284px;
      border-left: 1px solid var(--border);
    }
    .side-panel-inner {
      width: 284px; display: flex; flex-direction: column;
      min-height: 100%;
    }

    .sp-head {
      padding: 14px 16px 12px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; background: var(--surface);
    }
    .sp-date { font-size: 15px; font-weight: 700; color: var(--text); }
    .sp-close {
      width: 28px; height: 28px; border: none; background: none;
      border-radius: var(--radius-sm); cursor: pointer; color: var(--text-muted); font-size: 15px;
      display: flex; align-items: center; justify-content: center; transition: background .15s;
    }
    .sp-close:hover { background: var(--bg); color: var(--text); }

    .sp-body {
      flex: 1; overflow-y: auto; padding: 12px 14px;
      display: flex; flex-direction: column; gap: 6px;
    }

    .sp-section-lbl {
      font-size: 10px; font-weight: 700; color: var(--text-muted);
      letter-spacing: .8px; text-transform: uppercase; padding: 6px 0 2px;
    }

    .sp-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted); text-align: center; gap: 8px;
      padding: 40px 0; font-size: 13px; font-weight: 600;
    }
    .sp-empty-icon { font-size: 32px; }

    .sp-item {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 10px 12px; border-radius: 8px;
      background: var(--bg); cursor: pointer;
      transition: background .12s, transform .1s;
      border: 1px solid var(--border);
    }
    .sp-item:hover { background: #f3f4f6; transform: translateX(2px); }
    .sp-item-bar { width: 3px; flex-shrink: 0; border-radius: 2px; align-self: stretch; min-height: 20px; }
    .sp-item-content { flex: 1; min-width: 0; }
    .sp-item-title {
      font-size: 13px; font-weight: 700; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.3;
    }
    .sp-item-time { font-size: 11.5px; font-weight: 600; margin-top: 3px; }
    .sp-item-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    .sp-foot {
      padding: 12px 14px; border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .btn-sp-add {
      width: 100%; padding: 10px;
      background: var(--surface); border: 1.5px dashed var(--border);
      border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
      color: var(--text-sub); cursor: pointer; font-family: inherit;
      transition: border-color .15s, color .15s, background .15s;
    }
    .btn-sp-add:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-pale); }

    /* ══ MODALS ══ */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 500; display: none; align-items: center; justify-content: center; padding: 24px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
      width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .modal-header {
      padding: 22px 24px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .modal-title { font-size: 17px; font-weight: 700; }
    .modal-close {
      width: 30px; height: 30px; border: none; background: none; border-radius: var(--radius-sm);
      cursor: pointer; color: var(--text-muted); font-size: 16px;
      display: flex; align-items: center; justify-content: center; transition: background .15s;
    }
    .modal-close:hover { background: var(--bg); color: var(--text); }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; flex: 1; }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0;
    }

    .type-toggle { display: flex; border: 1.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
    .type-toggle-btn {
      flex: 1; padding: 9px; text-align: center; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; background: none; color: var(--text-muted); transition: background .15s, color .15s;
    }
    .type-toggle-btn:hover:not(.active) { background: var(--bg); color: var(--text); }
    .type-toggle-btn.active { background: var(--accent); color: #fff; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text); }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 14px; color: var(--text); background: var(--surface);
      transition: border-color .15s; font-family: inherit;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 72px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-error { font-size: 12px; color: #f87171; display: none; }
    .form-error.visible { display: block; }

    .btn-primary {
      padding: 10px 22px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .btn-primary:hover { background: #a07d44; }
    .btn-ghost {
      padding: 10px 18px; background: none; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; color: var(--text-sub);
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .btn-ghost:hover { border-color: var(--text-sub); color: var(--text); }
    .btn-danger {
      padding: 10px 18px; background: none; margin-right: auto;
      border: 1.5px solid #f87171; border-radius: var(--radius-sm);
      font-size: 14px; font-weight: 600; color: #f87171; cursor: pointer; transition: background .15s;
    }
    .btn-danger:hover { background: #fff1f2; }

    .modal.detail { max-width: 380px; }
    .detail-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
    }
    .detail-badge.site    { background: var(--accent-pale); color: var(--accent); }
    .detail-badge.general { background: #eeecea; color: #44403c; }
    .detail-title { font-size: 18px; font-weight: 700; margin-top: 10px; }
    .detail-rows { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
    .detail-row { display: flex; gap: 12px; font-size: 13px; }
    .detail-lbl { min-width: 52px; color: var(--text-muted); font-weight: 500; flex-shrink: 0; }
    .detail-val { color: var(--text); font-weight: 500; line-height: 1.5; }

    /* ══ BOTTOM NAV ══ */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: #1c1917;
      border-top: 1px solid #292524;
      z-index: 500;
      flex-direction: row;
      align-items: stretch;
    }
    .bnav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: #78716c;
      text-decoration: none;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      font-family: inherit;
      transition: color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .bnav-item.active { color: #d4b483; }
    .bnav-item:hover { color: #a8a29e; }
    .bnav-icon { font-size: 20px; line-height: 1; }
    .bnav-label { font-size: 10px; font-weight: 600; }

    .sp-drag-handle { width: 36px; height: 4px; background: #d1ccc8; border-radius: 2px; margin: 10px auto 0; }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 900px) {
      .side-panel.open { width: 240px; }
      .side-panel-inner { width: 240px; }
    }
    @media (max-width: 768px) {
      .bottom-nav { display: flex; }
      .sidebar { display: none !important; }
      .main { padding-bottom: 64px; }
      .content { padding: 16px !important; }
      .header { padding: 0 16px; height: 52px; }
      .header-date { display: none; }
      .header-user-name { display: none; }
      .btn-logout { padding: 6px 12px; font-size: 12px; }
      .page-header { flex-wrap: wrap; gap: 8px; }
      .btn-add { width: 100%; justify-content: center; margin-top: 4px; }
      .cal-body { position: relative; }
      .month-day { min-height: 56px; }
      .month-day-num { font-size: 12px; }
      .month-event { font-size: 10px; padding: 1px 4px; }
      .tab-bar { overflow-x: auto; }
      .month-cell { min-height: 56px; }
      /* bottom sheet for side panel */
      .side-panel {
        position: fixed !important;
        left: 0 !important; right: 0 !important;
        bottom: 56px !important; top: auto !important;
        width: 100% !important;
        max-height: 60vh;
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -8px 32px rgba(0,0,0,.18);
        transform: translateY(100%);
        transition: transform .3s ease;
        z-index: 400 !important;
        overflow-y: auto;
        background: var(--surface);
      }
      .side-panel.open {
        transform: translateY(0) !important;
        width: 100% !important;
      }
      .side-panel-inner { width: 100% !important; }
      .cal-card { overflow: visible; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="header-logo">GY</div>
    <div class="header-brand-name">공간<span>여운</span></div>
  </div>
  <div class="header-sep"></div>
  <div class="header-date" id="header-date"></div>
  <div class="header-user">
    <div class="header-avatar" id="user-avatar">관</div>
    <div class="header-user-name" id="user-name">관리자</div>
    <button class="btn-logout" id="logout-btn">로그아웃</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <div class="nav-section-label">업무</div>
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">🏠</span> 대시보드</a>
      <a class="nav-item" href="projects.html"><span class="nav-icon">🏗️</span> 프로젝트 관리</a>
      <a class="nav-item" href="consultation.html"><span class="nav-icon">📝</span> 회의록</a>
      <a class="nav-item" href="orders.html"><span class="nav-icon">📦</span> 발주서</a>
      <a class="nav-item active" href="schedule.html"><span class="nav-icon">🗓️</span> 일정</a>
      <div class="nav-section-label">시스템</div>
      <a class="nav-item" href="settings.html"><span class="nav-icon">⚙️</span> 설정</a>
    </nav>
  </aside>

  <main class="main">
    <div class="content">

      <div class="page-header">
        <div class="page-title-block">
          <div class="page-title">일정 관리</div>
          <div class="page-sub" id="page-sub"></div>
        </div>
        <button class="btn-add" id="btn-add">＋ 일정 추가</button>
      </div>

      <!-- 탭 -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="site">🏗️ 현장 일정</button>
        <button class="tab-btn" data-tab="general">📋 일반 일정</button>
      </div>

      <!-- 캘린더 카드 -->
      <div class="cal-card">

        <!-- 월간 nav -->
        <div class="cal-nav" id="nav-month">
          <button class="cal-nav-btn" id="btn-prev-month">&#8249;</button>
          <div class="cal-nav-title" id="month-title"></div>
          <button class="cal-nav-btn" id="btn-next-month">&#8250;</button>
        </div>

        <!-- 캘린더 바디 (캘린더 + 사이드 패널) -->
        <div class="cal-body" id="cal-body">

          <!-- 월간 그리드 -->
          <div id="view-month">
            <div class="month-dow-row">
              <div class="month-dow">월</div>
              <div class="month-dow">화</div>
              <div class="month-dow">수</div>
              <div class="month-dow">목</div>
              <div class="month-dow">금</div>
              <div class="month-dow" style="color:#94a3b8">토</div>
              <div class="month-dow" style="color:#60a5fa">일</div>
            </div>
            <div id="month-weeks"></div>
          </div>

          <!-- 사이드 패널 -->
          <div class="side-panel" id="side-panel">
            <div class="sp-drag-handle"></div>
            <div class="side-panel-inner">
              <div class="sp-head">
                <div class="sp-date" id="sp-date"></div>
                <button class="sp-close" id="sp-close">✕</button>
              </div>
              <div class="sp-body" id="sp-body"></div>
              <div class="sp-foot">
                <button class="btn-sp-add" id="btn-sp-add">＋ 이날 일정 추가</button>
              </div>
            </div>

<script>
/* ══════════════════════════════════════════
   COLOR SYSTEM
══════════════════════════════════════════ */
/* 프로젝트별 순환 색상 팔레트 (보라 계열 제외) */
const PROJ_PALETTE = [
  '#b5945a',  /* Gold   */
  '#3b82f6',  /* Blue   */
  '#10b981',  /* Green  */
  '#f97316',  /* Orange */
  '#ec4899',  /* Pink   */
  '#06b6d4',  /* Cyan   */
  '#ef4444',  /* Red    */
  '#f59e0b',  /* Amber  */
];
const MANUAL_COLOR = '#7C3AED';  /* 직접 추가 일정 - 보라 */

function hexToRgb(hex) {
  const h = hex.replace('#', '');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}

function getProjectColor(projectId) {
  if (!projectId) return PROJ_PALETTE[0];
  const idx = loadP().findIndex(p => p.id === projectId);
  return PROJ_PALETTE[(idx < 0 ? 0 : idx) % PROJ_PALETTE.length];
}

/* source='schedule' → 보라, source='project'/'meeting' → 프로젝트 팔레트 */
function getEventColor(source, projectId) {
  return source === 'schedule' ? MANUAL_COLOR : getProjectColor(projectId);
}

/* 칩용 (연한 배경 + 진한 텍스트) */
function chipInlineStyle(source, projectId) {
  const bg = getEventColor(source, projectId);
  const [r,g,b] = hexToRgb(bg);
  return `background:rgba(${r},${g},${b},0.13);color:${bg};border-left:3px solid ${bg};`;
}

/* ══════════════════════════════════════════
   CONSTANTS & STATE
══════════════════════════════════════════ */
const SCHED_KEY  = 'ppstudio_schedules';
const PROJ_KEY   = 'ppstudio_projects';
const MTG_KEY    = 'ppstudio_meetings';
const DOW_KO     = ['일','월','화','수','목','금','토'];
const MON_KO     = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

const todayDate = new Date();
todayDate.setHours(0,0,0,0);

let activeTab    = 'site';
let calYear      = todayDate.getFullYear();
let calMonth     = todayDate.getMonth();
let panelDate    = null;   /* currently shown date string in panel */
let editingId    = null;
let detailId     = null;
let currentType  = 'site';

/* ══════════════════════════════════════════
   STORAGE
══════════════════════════════════════════ */
function loadS() { try { return JSON.parse(localStorage.getItem(SCHED_KEY)) || []; } catch { return []; } }
function saveS(a) { localStorage.setItem(SCHED_KEY, JSON.stringify(a)); }
function loadP() { try { return JSON.parse(localStorage.getItem(PROJ_KEY))  || []; } catch { return []; } }
function loadM() { try { return JSON.parse(localStorage.getItem(MTG_KEY))   || []; } catch { return []; } }

/* ══════════════════════════════════════════
   DUMMY SCHEDULES
══════════════════════════════════════════ */
(function seedDummy() {
  if (loadS().length) return;
  const y = todayDate.getFullYear();
  const m = String(todayDate.getMonth() + 1).padStart(2, '0');
  saveS([
    { id:'sched-d1', type:'site',    title:'강남 아파트 현장 착공',
      projectId:null, projectName:null,
      startDate:`${y}-${m}-10`, startTime:'09:00', endDate:`${y}-${m}-10`, endTime:'17:00',
      assignee:'김도현', memo:'기초공사 시작. 자재 반입 확인 필요.' },
    { id:'sched-d2', type:'site',    title:'마포 카페 마감재 점검',
      projectId:null, projectName:null,
      startDate:`${y}-${m}-12`, startTime:'10:00', endDate:`${y}-${m}-12`, endTime:'14:00',
      assignee:'이수진', memo:'마감재 색상 최종 확인.' },
    { id:'sched-d3', type:'site',    title:'잠실 오피스 시공 감리',
      projectId:null, projectName:null,
      startDate:`${y}-${m}-18`, startTime:'13:00', endDate:`${y}-${m}-18`, endTime:'18:00',
      assignee:'박민준', memo:'전기·조명 배선 점검 포함.' },
    { id:'sched-d4', type:'general', title:'팀 주간 회의',
      projectId:null, projectName:null,
      startDate:`${y}-${m}-11`, startTime:'10:00', endDate:`${y}-${m}-11`, endTime:'11:00',
      assignee:'전체', memo:'주간 업무 보고.' },
    { id:'sched-d5', type:'general', title:'자재 공급업체 미팅',
      projectId:null, projectName:null,
      startDate:`${y}-${m}-16`, startTime:'14:00', endDate:`${y}-${m}-16`, endTime:'16:00',
      assignee:'김도현', memo:'2분기 단가 협상.' },
  ]);
})();

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
function ymd(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function sameDay(a, b) {
  return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
}
function fmtKDate(s) {
  if (!s) return '';
  const [y,m,d] = s.split('-');
  return `${y}년 ${+m}월 ${+d}일`;
}

/* ══════════════════════════════════════════
   DATA AGGREGATORS
══════════════════════════════════════════ */

/* 월간 캘린더용 맵: { dayYmd → [{id, title, source, projectId}] } */
function getMonthMap() {
  const first = ymd(new Date(calYear, calMonth, 1));
  const last  = ymd(new Date(calYear, calMonth + 1, 0));
  const map   = {};
  const add   = (d, item) => { (map[d] = map[d] || []).push(item); };

  if (activeTab === 'site') {
    loadP().forEach(p => {
      if (p.startDate && p.startDate >= first && p.startDate <= last)
        add(p.startDate, { id:p.id, title:p.name, source:'project', projectId:p.id });
    });
    loadS().filter(s => s.type === 'site').forEach(s => {
      if (s.startDate && s.startDate >= first && s.startDate <= last)
        add(s.startDate, { id:s.id, title:s.title, source:'schedule', projectId:s.projectId||null });
    });
  } else {
    const pMap = {};
    loadP().forEach(p => { pMap[p.id] = p.name; });
    loadM().forEach(m => {
      if (m.date && m.date >= first && m.date <= last)
        add(m.date, { id:m.id, title:`${pMap[m.projectId]||'기타'} · ${m.method}`, source:'meeting', projectId:m.projectId });
    });
    loadS().filter(s => s.type === 'general').forEach(s => {
      if (s.startDate && s.startDate >= first && s.startDate <= last)
        add(s.startDate, { id:s.id, title:s.title, source:'schedule', projectId:s.projectId||null });
    });
  }
  return map;
}

/* 패널용 아이템: { allDay[], timed[] } - 각 item에 projectId 포함 */
function getDayItems(dayYmdStr) {
  const allDay = [];
  const timed  = [];
  const pArr   = loadP();
  const pMap   = {};
  pArr.forEach(p => { pMap[p.id] = p; });

  if (activeTab === 'site') {
    pArr.filter(p => p.startDate === dayYmdStr).forEach(p => {
      const sub = [p.client, p.stage].filter(Boolean).join(' | ');
      allDay.push({ source:'project', id:p.id, projectId:p.id, title:p.name, sub });
    });
    loadS().filter(s => s.type === 'site' && s.startDate === dayYmdStr).forEach(s => {
      timed.push({ source:'schedule', id:s.id, projectId:s.projectId||null, title:s.title,
                   startTime:s.startTime, endTime:s.endTime,
                   sub: s.assignee ? `담당: ${s.assignee}` : '' });
    });
  } else {
    loadM().filter(m => m.date === dayYmdStr).forEach(m => {
      const proj = pMap[m.projectId];
      const item = { source:'meeting', id:m.id, projectId:m.projectId,
                     title: proj?.name || '프로젝트 미지정',
                     sub: m.method || '',
                     startTime: m.startTime||null, endTime: m.endTime||null };
      (m.startTime ? timed : allDay).push(item);
    });
    loadS().filter(s => s.type === 'general' && s.startDate === dayYmdStr).forEach(s => {
      timed.push({ source:'schedule', id:s.id, projectId:s.projectId||null, title:s.title,
                   startTime:s.startTime, endTime:s.endTime,
                   sub: s.assignee ? `담당: ${s.assignee}` : '' });
    });
  }
  return { allDay, timed };
}

/* ══════════════════════════════════════════
   HEADER / USER
══════════════════════════════════════════ */
(function initHeader() {
  const days = ['일','월','화','수','목','금','토'];
  const n    = new Date();
  document.getElementById('header-date').textContent =
    `${n.getFullYear()}년 ${n.getMonth()+1}월 ${n.getDate()}일 (${days[n.getDay()]})`;
  let name = '관리자';
  try { const u = JSON.parse(localStorage.getItem('ppstudio_user')); if (u?.name) name = u.name; } catch {}
  document.getElementById('user-name').textContent   = name;
  document.getElementById('user-avatar').textContent = name.slice(-1);
  document.getElementById('page-sub').textContent    = '현장 일정과 회의 일정을 한눈에 확인하세요';
  document.getElementById('logout-btn').addEventListener('click', function () {
    localStorage.removeItem('ppstudio_user');
    window.location.replace('login.html');
  });
})();

/* ══════════════════════════════════════════
   MONTHLY RENDER
══════════════════════════════════════════ */
function renderMonth() {
  document.getElementById('month-title').textContent = `${calYear}년 ${MON_KO[calMonth]}`;

  const map   = getMonthMap();
  const first = new Date(calYear, calMonth, 1);
  const last  = new Date(calYear, calMonth + 1, 0);
  let startDow = first.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  let cell = addDays(first, -startDow);
  const totalWeeks = Math.ceil((startDow + last.getDate()) / 7);
  let html = '';

  for (let w = 0; w < totalWeeks; w++) {
    html += '<div class="month-week">';
    for (let d = 0; d < 7; d++) {
      const inMonth  = cell.getMonth() === calMonth;
      const isToday  = sameDay(cell, todayDate);
      const dayYmdStr = ymd(cell);
      const isSun = d === 6, isSat = d === 5;
      const isPanelActive = panelDate === dayYmdStr;

      const evs = map[dayYmdStr] || [];
      let evHtml = '';
      evs.slice(0, 2).forEach(ev => {
        const cs = chipInlineStyle(ev.source, ev.projectId);
        evHtml += `<div class="cell-chip" style="${cs}" data-date="${dayYmdStr}">${ev.title}</div>`;
      });
      if (evs.length > 2) evHtml += `<div class="cell-more">+${evs.length-2}개 더</div>`;

      let cls = 'month-cell';
      if (!inMonth)     cls += ' other-month';
      if (isToday)      cls += ' today';
      if (isSun)        cls += ' is-sun';
      if (isSat)        cls += ' is-sat';
      if (isPanelActive && !isToday) cls += ' panel-active';

      html += `<div class="${cls}" data-date="${dayYmdStr}">
        <div class="cell-date">${cell.getDate()}</div>
        <div class="cell-events">${evHtml}</div>
      </div>`;
      cell = addDays(cell, 1);
    }
    html += '</div>';
  }

  document.getElementById('month-weeks').innerHTML = html;

  /* 날짜 클릭 → 사이드 패널 열기/갱신 */
  document.querySelectorAll('.month-cell').forEach(el => {
    el.addEventListener('click', function () {
      openPanel(this.dataset.date);
      renderMonth(); /* 패널 활성 날짜 하이라이트 갱신 */
    });
  });
}

/* ══════════════════════════════════════════
   SIDE PANEL
══════════════════════════════════════════ */
function openPanel(dayYmdStr) {
  panelDate = dayYmdStr;
  const d = new Date(dayYmdStr + 'T00:00:00');
  const dowLabel = ['일','월','화','수','목','금','토'];
  document.getElementById('sp-date').textContent =
    `${d.getMonth()+1}월 ${d.getDate()}일 ${dowLabel[d.getDay()]}요일`;

  renderPanelBody(dayYmdStr);
  document.getElementById('side-panel').classList.add('open');
}

function renderPanelBody(dayYmdStr) {
  const { allDay, timed } = getDayItems(dayYmdStr);
  const timedSorted = timed.slice().sort((a,b) => (a.startTime||'').localeCompare(b.startTime||''));
  const hasItems = allDay.length > 0 || timed.length > 0;

  if (!hasItems) {
    document.getElementById('sp-body').innerHTML = `
      <div class="sp-empty">
        <div class="sp-empty-icon">📭</div>
        <div>이 날 일정이 없습니다</div>
      </div>`;
    return;
  }

  let html = '';

  if (allDay.length > 0) {
    html += '<div class="sp-section-lbl">하루 종일</div>';
    allDay.forEach(item => {
      const color = getEventColor(item.source, item.projectId);
      html += buildSpItem(item, color, false);
    });
  }

  if (timedSorted.length > 0) {
    if (allDay.length > 0) html += '<div class="sp-section-lbl" style="margin-top:4px">시간 일정</div>';
    timedSorted.forEach(item => {
      const color = getEventColor(item.source, item.projectId);
      html += buildSpItem(item, color, true);
    });
  }

  document.getElementById('sp-body').innerHTML = html;

  document.querySelectorAll('.sp-item').forEach(el => {
    el.addEventListener('click', function () {
      const src = this.dataset.source;
      const id  = this.dataset.id;
      if (src === 'schedule')     openDetail(id);
      else if (src === 'meeting') window.location.href = 'consultation.html';
      else if (src === 'project') window.location.href = `project-detail.html?id=${id}`;
    });
  });
}

function buildSpItem(item, color, showTime) {
  return `
    <div class="sp-item" data-source="${item.source}" data-id="${item.id}">
      <div class="sp-item-bar" style="background:${color}"></div>
      <div class="sp-item-content">
        <div class="sp-item-title">${item.title}</div>
        ${showTime && item.startTime ? `<div class="sp-item-time" style="color:${color}">${item.startTime} — ${item.endTime}</div>` : ''}
        ${item.sub ? `<div class="sp-item-sub">${item.sub}</div>` : ''}
      </div>
    </div>`;
}

function closePanel() {
  panelDate = null;
  document.getElementById('side-panel').classList.remove('open');
  /* 활성 날짜 하이라이트 제거 */
  document.querySelectorAll('.month-cell.panel-active').forEach(el => el.classList.remove('panel-active'));
}

document.getElementById('sp-close').addEventListener('click', closePanel);

/* 패널 바깥 클릭 시 닫기 */
document.addEventListener('click', function (e) {
  const panel = document.getElementById('side-panel');
  if (!panel.classList.contains('open')) return;
  if (e.target.closest('#side-panel') || e.target.closest('.month-cell')) return;
  closePanel();
});

/* 패널 내 "이날 일정 추가" */
document.getElementById('btn-sp-add').addEventListener('click', function () {
  openAdd(panelDate);
});

/* ══════════════════════════════════════════
   MONTH NAV
══════════════════════════════════════════ */
document.getElementById('btn-prev-month').addEventListener('click', function () {
  if (calMonth === 0) { calMonth = 11; calYear--; } else calMonth--;
  renderMonth();
});
document.getElementById('btn-next-month').addEventListener('click', function () {
  if (calMonth === 11) { calMonth = 0; calYear++; } else calMonth++;
  renderMonth();
});

/* ══════════════════════════════════════════
   TAB SWITCHING
══════════════════════════════════════════ */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function () {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeTab = this.dataset.tab;
    renderMonth();
    if (panelDate) renderPanelBody(panelDate); /* 열려있으면 내용 갱신 */
  });
});

/* ══════════════════════════════════════════
   ADD / EDIT MODAL
══════════════════════════════════════════ */
function setType(t) {
  currentType = t;
  document.querySelectorAll('.type-toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.type === t));
  document.getElementById('field-project').style.display = t === 'site' ? 'flex' : 'none';
}

function fillProjectSelect() {
  const sel = document.getElementById('f-project');
  sel.innerHTML = '<option value="">프로젝트 선택 (선택사항)</option>';
  loadP().forEach(p => sel.insertAdjacentHTML('beforeend', `<option value="${p.id}">${p.name}</option>`));
}

function openAdd(dateStr) {
  editingId = null;
  document.getElementById('add-modal-title').textContent = '일정 추가';
  document.getElementById('add-save').textContent = '저장';
  document.getElementById('f-title').value    = '';
  document.getElementById('f-assignee').value = '';
  document.getElementById('f-memo').value     = '';
  document.getElementById('add-error').classList.remove('visible');
  const d = dateStr || ymd(todayDate);
  document.getElementById('f-start-date').value = d;
  document.getElementById('f-end-date').value   = d;
  document.getElementById('f-start-time').value = '09:00';
  document.getElementById('f-end-time').value   = '18:00';
  setType(activeTab);
  fillProjectSelect();
  document.getElementById('modal-add').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 50);
}

function closeAdd() { document.getElementById('modal-add').classList.remove('open'); editingId = null; }

document.getElementById('btn-add').addEventListener('click',    () => openAdd(panelDate));
document.getElementById('add-close').addEventListener('click',  closeAdd);
document.getElementById('add-cancel').addEventListener('click', closeAdd);
document.getElementById('modal-add').addEventListener('click', e => { if (e.target === e.currentTarget) closeAdd(); });

document.querySelectorAll('.type-toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => setType(btn.dataset.type));
});

document.getElementById('add-save').addEventListener('click', function () {
  const title    = document.getElementById('f-title').value.trim();
  const sDate    = document.getElementById('f-start-date').value;
  const eDate    = document.getElementById('f-end-date').value;
  const sTime    = document.getElementById('f-start-time').value;
  const eTime    = document.getElementById('f-end-time').value;
  const assignee = document.getElementById('f-assignee').value.trim();
  const memo     = document.getElementById('f-memo').value.trim();
  if (!title || !sDate) { document.getElementById('add-error').classList.add('visible'); return; }

  const projSel  = document.getElementById('f-project');
  const projId   = projSel.value || null;
  const projName = projId ? projSel.options[projSel.selectedIndex].textContent : null;

  const list = loadS();
  if (editingId) {
    const i = list.findIndex(s => s.id === editingId);
    if (i !== -1) list[i] = { ...list[i], type:currentType, title, projectId:projId, projectName:projName,
      startDate:sDate, startTime:sTime, endDate:eDate||sDate, endTime:eTime, assignee, memo };
  } else {
    list.push({ id:'sched-'+Date.now(), type:currentType, title, projectId:projId, projectName:projName,
      startDate:sDate, startTime:sTime, endDate:eDate||sDate, endTime:eTime, assignee, memo });
  }
  saveS(list);
  closeAdd();
  renderMonth();
  if (panelDate) renderPanelBody(panelDate);
});

/* ══════════════════════════════════════════
   DETAIL MODAL
══════════════════════════════════════════ */
function openDetail(id) {
  const ev = loadS().find(s => s.id === id);
  if (!ev) return;
  detailId = id;
  const isS = ev.type === 'site';
  const color = getEventColor('schedule', null);

  let html = `
    <span class="detail-badge" style="background:rgba(${hexToRgb(color).join(',')},0.12);color:${color};">
      ${isS ? '🏗️ 현장 일정' : '📋 일반 일정'}
    </span>
    <div class="detail-title">${ev.title}</div>
    <div class="detail-rows">`;
  if (isS && ev.projectName) html += `
    <div class="detail-row"><div class="detail-lbl">프로젝트</div><div class="detail-val">${ev.projectName}</div></div>`;
  html += `
    <div class="detail-row">
      <div class="detail-lbl">날짜</div>
      <div class="detail-val">${fmtKDate(ev.startDate)}${ev.endDate && ev.endDate !== ev.startDate ? ' ~ '+fmtKDate(ev.endDate) : ''}</div>
    </div>
    <div class="detail-row">
      <div class="detail-lbl">시간</div>
      <div class="detail-val">${ev.startTime} — ${ev.endTime}</div>
    </div>`;
  if (ev.assignee) html += `
    <div class="detail-row"><div class="detail-lbl">담당자</div><div class="detail-val">${ev.assignee}</div></div>`;
  if (ev.memo) html += `
    <div class="detail-row"><div class="detail-lbl">메모</div><div class="detail-val" style="white-space:pre-line">${ev.memo}</div></div>`;
  html += '</div>';
  document.getElementById('detail-body').innerHTML = html;
  document.getElementById('modal-detail').classList.add('open');
}

function closeDetail() { document.getElementById('modal-detail').classList.remove('open'); detailId = null; }

document.getElementById('detail-close').addEventListener('click', closeDetail);
document.getElementById('detail-ok').addEventListener('click',    closeDetail);
document.getElementById('modal-detail').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });

document.getElementById('detail-delete').addEventListener('click', function () {
  if (!detailId || !confirm('이 일정을 삭제하시겠어요?')) return;
  saveS(loadS().filter(s => s.id !== detailId));
  closeDetail();
  renderMonth();
  if (panelDate) renderPanelBody(panelDate);
});

document.getElementById('detail-edit').addEventListener('click', function () {
  const ev = loadS().find(s => s.id === detailId);
  if (!ev) return;
  closeDetail();
  editingId = ev.id;
  document.getElementById('add-modal-title').textContent = '일정 수정';
  document.getElementById('add-save').textContent = '수정';
  fillProjectSelect();
  setType(ev.type);
  document.getElementById('f-title').value      = ev.title;
  document.getElementById('f-start-date').value = ev.startDate;
  document.getElementById('f-end-date').value   = ev.endDate || ev.startDate;
  document.getElementById('f-start-time').value = ev.startTime;
  document.getElementById('f-end-time').value   = ev.endTime;
  document.getElementById('f-assignee').value   = ev.assignee || '';
  document.getElementById('f-memo').value       = ev.memo || '';
  if (ev.projectId) document.getElementById('f-project').value = ev.projectId;
  document.getElementById('add-error').classList.remove('visible');
  document.getElementById('modal-add').classList.add('open');
});

/* ESC */
document.addEventListener('keydown', function (e) {
  if (e.key !== 'Escape') return;
  if (document.getElementById('modal-add').classList.contains('open'))    closeAdd();
  if (document.getElementById('modal-detail').classList.contains('open')) closeDetail();
});

/* INIT */
renderMonth();
</script>
</body>
</html>
