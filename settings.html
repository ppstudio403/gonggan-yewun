<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공간여운 — 설정</title>
  <script>
    (function () {
      const u = JSON.parse(localStorage.getItem('ppstudio_user') || 'null');
      if (!u) window.location.replace('login.html');
      else if (u.role !== '관리자') window.location.replace('dashboard.html');
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f3f0; --surface: #ffffff; --sidebar: #1c1917; --sidebar-hover: #292524;
      --accent: #b5945a; --accent-light: #d4b483; --accent-pale: #f5ead8;
      --text: #1c1917; --text-sub: #78716c; --text-muted: #a8a29e; --border: #e7e5e4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow: 0 4px 16px rgba(0,0,0,.10);
      --radius: 12px; --radius-sm: 8px;
    }
    body { font-family: 'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── HEADER ── */
    .header { background: var(--sidebar); height: 64px; display: flex; align-items: center; padding: 0 28px; gap: 16px; flex-shrink: 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #292524; }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .header-brand-name { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -.3px; }
    .header-brand-name span { color: var(--accent-light); }
    .header-sep { flex: 1; }
    .header-date { font-size: 13px; color: #57534e; }
    .header-user { display: flex; align-items: center; gap: 10px; }
    .header-avatar { width: 34px; height: 34px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .header-user-name { font-size: 14px; font-weight: 600; color: #e7e5e4; }
    .btn-logout { padding: 7px 16px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); border-radius: var(--radius-sm); color: #a8a29e; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s, color .15s; }
    .btn-logout:hover { background: rgba(255,255,255,.13); color: #e7e5e4; }

    /* ── LAYOUT ── */
    .layout { display: flex; flex: 1; min-height: 0; }
    .sidebar { width: 220px; background: var(--sidebar); display: flex; flex-direction: column; flex-shrink: 0; position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto; border-right: 1px solid #292524; }
    .sidebar-nav { flex: 1; padding: 16px 10px; display: flex; flex-direction: column; gap: 2px; }
    .nav-section-label { font-size: 10px; font-weight: 600; color: #57534e; letter-spacing: 1px; text-transform: uppercase; padding: 12px 12px 6px; margin-top: 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: var(--radius-sm); cursor: pointer; transition: background .15s, color .15s; color: #a8a29e; font-size: 13.5px; font-weight: 500; border: none; background: none; width: 100%; text-align: left; text-decoration: none; }
    .nav-item:hover { background: var(--sidebar-hover); color: #e7e5e4; }
    .nav-item.active { background: rgba(181,148,90,.15); color: var(--accent-light); }
    .nav-icon { font-size: 16px; flex-shrink: 0; }
    .main { flex: 1; min-width: 0; overflow-y: auto; }
    .content { padding: 32px; display: flex; flex-direction: column; gap: 22px; max-width: 1100px; }

    /* ── PAGE TITLE ── */
    .page-title { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }

    /* ── TABS ── */
    .tab-bar { display: flex; border-bottom: 2px solid var(--border); gap: 0; }
    .tab-btn { padding: 10px 24px; background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; font-family: inherit; transition: color .15s, border-color .15s; }
    .tab-btn:hover { color: var(--text-sub); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-panel { display: none; flex-direction: column; gap: 20px; }
    .tab-panel.active { display: flex; }

    /* ── SECTION HEADER ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .section-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .section-sub { font-size: 13px; color: var(--text-muted); margin-top: 3px; }

    /* ── BUTTONS ── */
    .btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 10px 22px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 700; cursor: pointer; transition: background .15s; font-family: inherit; }
    .btn-primary:hover { background: #a07d44; }
    .btn-secondary { padding: 10px 18px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-sub); font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; }
    .btn-secondary:hover { background: var(--bg); }
    .btn-danger { padding: 10px 16px; border: 1.5px solid #fecaca; border-radius: var(--radius-sm); background: transparent; color: #dc2626; font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background .15s; }
    .btn-danger:hover { background: #fff1f2; }

    /* ── EMPLOYEE GRID ── */
    .emp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
    .emp-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px 18px; cursor: pointer; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow-sm); transition: border-color .15s, box-shadow .15s, transform .1s; }
    .emp-card:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(181,148,90,.12); transform: translateY(-1px); }
    .emp-avatar { width: 44px; height: 44px; border-radius: 11px; background: var(--accent-pale); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800; color: var(--accent); flex-shrink: 0; }
    .emp-info { flex: 1; min-width: 0; }
    .emp-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .emp-username { font-size: 12.5px; color: var(--text-muted); }
    .emp-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }

    /* ── ROLE BADGE ── */
    .role-badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11.5px; font-weight: 700; white-space: nowrap; }
    .rb-관리자   { background: #f5ead8; color: #b5945a; }
    .rb-디자이너  { background: #eff6ff; color: #2563eb; }
    .rb-현장시공팀 { background: #f0fdf4; color: #16a34a; }
    .rb-재무팀장  { background: #faf5ff; color: #7c3aed; }

    /* ── STATUS BADGE ── */
    .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
    .sb-active   { background: #f0fdf4; color: #16a34a; }
    .sb-inactive { background: #f1f5f9; color: #64748b; }
    .status-dot  { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* ── TOGGLE SWITCH ── */
    .toggle-wrap { position: relative; display: inline-block; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track { position: absolute; inset: 0; background: #d1ccc8; border-radius: 20px; cursor: pointer; transition: background .2s; }
    .toggle-track::before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
    .toggle-wrap input:checked + .toggle-track { background: var(--accent); }
    .toggle-wrap input:checked + .toggle-track::before { transform: translateX(16px); }
    .toggle-wrap input:disabled + .toggle-track { opacity: .45; cursor: not-allowed; }

    /* ── MODAL ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.42); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 460px; box-shadow: 0 20px 60px rgba(0,0,0,.22); overflow: hidden; max-height: 92vh; display: flex; flex-direction: column; }
    .modal-header { padding: 18px 22px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .modal-title { font-size: 16px; font-weight: 700; color: var(--text); }
    .modal-close { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border: none; background: none; border-radius: 6px; color: var(--text-muted); font-size: 14px; cursor: pointer; transition: background .15s; }
    .modal-close:hover { background: var(--bg); }
    .modal-body { padding: 22px; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; }
    .modal-footer { padding: 16px 22px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .modal-footer-spacer { flex: 1; }

    /* form elements inside modal */
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-label { font-size: 12.5px; font-weight: 600; color: var(--text); }
    .form-label .req { color: #dc2626; margin-left: 2px; }
    .form-input, .form-select { padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 13.5px; color: var(--text); background: var(--bg); outline: none; transition: border-color .2s, box-shadow .2s; font-family: inherit; width: 100%; }
    .form-input:focus, .form-select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(181,148,90,.1); background: #fff; }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:read-only { opacity: .6; cursor: default; }
    .form-hint { font-size: 12px; color: var(--text-muted); }

    .pw-change-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm); user-select: none; }
    .pw-change-label { font-size: 13px; font-weight: 600; color: var(--text-sub); }

    .status-toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--radius-sm); }
    .status-toggle-text { font-size: 13.5px; color: var(--text); font-weight: 500; }

    /* ── PERMISSION TABLE ── */
    .perm-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; }
    .perm-card-header { padding: 16px 22px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .perm-card-title { font-size: 14px; font-weight: 700; color: var(--text); }
    .perm-card-sub { font-size: 12.5px; color: var(--text-muted); margin-top: 3px; }
    .btn-save-perm { padding: 8px 20px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; cursor: pointer; transition: background .15s; font-family: inherit; }
    .btn-save-perm:hover { background: #a07d44; }

    .perm-table-wrap { overflow-x: auto; }
    .perm-table { width: 100%; border-collapse: collapse; min-width: 780px; }
    .perm-table th, .perm-table td { border: 1px solid var(--border); }
    .perm-table thead th { background: #faf9f8; font-size: 13px; font-weight: 700; color: var(--text-sub); padding: 12px 16px; text-align: center; }
    .perm-table thead th:first-child { text-align: left; }
    .perm-table td.role-cell { padding: 14px 18px; background: #faf9f8; min-width: 110px; }
    .perm-table td.perm-cell { padding: 10px 14px; vertical-align: middle; }
    .perm-cell-inner { display: flex; flex-direction: column; gap: 6px; }
    .perm-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; min-width: 90px; }
    .perm-row-label { font-size: 12px; color: var(--text-sub); font-weight: 500; }

    .admin-perm-row td { background: var(--sidebar) !important; }
    .admin-perm-row td.role-cell { border-right-color: #3a3330; }
    .admin-all-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(181,148,90,.12); color: var(--accent-light); border: 1px solid rgba(181,148,90,.18); border-radius: 20px; padding: 5px 14px; font-size: 12.5px; font-weight: 600; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--sidebar); color: #e7e5e4; padding: 12px 22px; border-radius: var(--radius-sm); font-size: 13.5px; font-weight: 600; opacity: 0; pointer-events: none; z-index: 300; white-space: nowrap; transition: opacity .2s, transform .2s; border: 1px solid #3a3330; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 56px;
      background: #1c1917;
      border-top: 1px solid #292524;
      z-index: 500;
      flex-direction: row;
      align-items: stretch;
    }
    .bnav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      color: #78716c;
      text-decoration: none;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      font-family: inherit;
      transition: color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .bnav-item.active { color: #d4b483; }
    .bnav-item:hover { color: #a8a29e; }
    .bnav-icon { font-size: 20px; line-height: 1; }
    .bnav-label { font-size: 10px; font-weight: 600; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .bottom-nav { display: flex; }
      .sidebar { display: none !important; }
      .main { padding-bottom: 64px; }
      .content { padding: 16px !important; }
      .header { padding: 0 16px; height: 52px; }
      .header-brand-name { font-size: 16px; }
      .header-date { display: none; }
      .header-user-name { display: none; }
      .btn-logout { padding: 6px 12px; font-size: 12px; }
      .emp-grid { grid-template-columns: 1fr !important; }
      .perm-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .tab-bar { overflow-x: auto; }
      .tab-btn { white-space: nowrap; }
      .modal { max-width: 100% !important; margin: 0; border-radius: 0; max-height: 100vh; }
      .modal-overlay { padding: 0; align-items: flex-end; }
    }
  </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="header">
  <div class="header-brand">
    <div class="header-logo">GY</div>
    <div class="header-brand-name">공간<span>여운</span></div>
  </div>
  <div class="header-sep"></div>
  <div class="header-date" id="header-date"></div>
  <div class="header-user">
    <div class="header-avatar" id="user-avatar">관</div>
    <div class="header-user-name" id="user-name">관리자</div>
    <button class="btn-logout" id="logout-btn">로그아웃</button>
  </div>
</header>

<div class="layout">
  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <div class="nav-section-label">업무</div>
      <a class="nav-item" href="dashboard.html"><span class="nav-icon">🏠</span> 대시보드</a>
      <a class="nav-item" href="projects.html"><span class="nav-icon">🏗️</span> 프로젝트 관리</a>
      <a class="nav-item" href="consultation.html"><span class="nav-icon">📝</span> 회의록</a>
      <a class="nav-item" href="orders.html"><span class="nav-icon">📦</span> 발주서</a>
      <a class="nav-item" href="schedule.html"><span class="nav-icon">🗓️</span> 일정</a>
      <div class="nav-section-label">시스템</div>
      <a class="nav-item active" href="settings.html"><span class="nav-icon">⚙️</span> 설정</a>
    </nav>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="main">
    <div class="content">
      <h1 class="page-title">설정</h1>

      <!-- TAB BAR -->
      <div class="tab-bar">
        <button class="tab-btn active" data-tab="employees">직원 계정 관리</button>
        <button class="tab-btn" data-tab="permissions">권한 설정</button>
      </div>

      <!-- TAB: 직원 계정 관리 -->
      <div class="tab-panel active" id="tab-employees"></div>

      <!-- TAB: 권한 설정 -->
      <div class="tab-panel" id="tab-permissions"></div>

  </main>
</div>

<!-- ═══ EMPLOYEE MODAL ═══ -->
<div class="modal-overlay" id="emp-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">직원 추가</div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <div id="modal-footer-left"></div>
      <div class="modal-footer-spacer"></div>
      <button class="btn-secondary" id="modal-cancel">취소</button>
      <button class="btn-primary" id="modal-save">저장</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a class="bnav-item" href="dashboard.html"><span class="bnav-icon">🏠</span><span class="bnav-label">홈</span></a>
  <a class="bnav-item" href="projects.html"><span class="bnav-icon">🏗️</span><span class="bnav-label">프로젝트</span></a>
  <a class="bnav-item" href="consultation.html"><span class="bnav-icon">📝</span><span class="bnav-label">회의록</span></a>
  <a class="bnav-item" href="orders.html"><span class="bnav-icon">📦</span><span class="bnav-label">발주서</span></a>
  <a class="bnav-item" href="schedule.html"><span class="bnav-icon">🗓️</span><span class="bnav-label">일정</span></a>
  <a class="bnav-item active" href="settings.html"><span class="bnav-icon">☰</span><span class="bnav-label">설정</span></a>
</nav>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
const user = JSON.parse(localStorage.getItem('ppstudio_user') || 'null');
if (!user || user.role !== '관리자') {
  window.location.replace(user ? 'dashboard.html' : 'login.html');
}

document.getElementById('user-name').textContent   = user.name;
document.getElementById('user-avatar').textContent = user.name.charAt(0);
document.getElementById('header-date').textContent =
  new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
document.getElementById('logout-btn').addEventListener('click', () => {
  localStorage.removeItem('ppstudio_user');
  window.location.href = 'login.html';
});

/* ════════════════════════════════════════
   CONFIG
════════════════════════════════════════ */
const ROLES          = ['관리자', '디자이너', '현장시공팀', '재무팀장'];
const EDITABLE_ROLES = ['디자이너', '현장시공팀', '재무팀장'];
const MENUS          = ['대시보드', '프로젝트 관리', '회의록', '발주서', '일정', '설정'];
const PERM_TYPES     = ['read', 'write', 'delete'];
const PERM_KO        = { read: '읽기', write: '쓰기', delete: '삭제' };

const DEFAULT_PERMISSIONS = {
  '디자이너': {
    '대시보드':    { read: true,  write: false, delete: false },
    '프로젝트 관리': { read: true,  write: true,  delete: false },
    '회의록':      { read: true,  write: true,  delete: false },
    '발주서':      { read: true,  write: true,  delete: false },
    '일정':        { read: true,  write: true,  delete: false },
    '설정':        { read: false, write: false, delete: false },
  },
  '현장시공팀': {
    '대시보드':    { read: true,  write: false, delete: false },
    '프로젝트 관리': { read: true,  write: false, delete: false },
    '회의록':      { read: true,  write: false, delete: false },
    '발주서':      { read: true,  write: true,  delete: false },
    '일정':        { read: true,  write: true,  delete: false },
    '설정':        { read: false, write: false, delete: false },
  },
  '재무팀장': {
    '대시보드':    { read: true,  write: false, delete: false },
    '프로젝트 관리': { read: true,  write: false, delete: false },
    '회의록':      { read: true,  write: false, delete: false },
    '발주서':      { read: true,  write: true,  delete: true  },
    '일정':        { read: true,  write: false, delete: false },
    '설정':        { read: false, write: false, delete: false },
  },
};

const INIT_USERS = [
  { id: 'usr-001', username: 'admin', password: 'admin1234', name: '관리자', role: '관리자', active: true }
];

/* ════════════════════════════════════════
   DATA LAYER
════════════════════════════════════════ */
function loadUsers() {
  const raw = localStorage.getItem('ppstudio_users');
  if (!raw) { saveUsers(INIT_USERS); return INIT_USERS.slice(); }
  return JSON.parse(raw);
}
function saveUsers(list) { localStorage.setItem('ppstudio_users', JSON.stringify(list)); }

function loadPermissions() {
  const raw = localStorage.getItem('ppstudio_permissions');
  const base = JSON.parse(JSON.stringify(DEFAULT_PERMISSIONS));
  if (!raw) return base;
  const saved = JSON.parse(raw);
  EDITABLE_ROLES.forEach(role => {
    if (!saved[role]) return;
    MENUS.forEach(menu => {
      if (saved[role][menu]) base[role][menu] = saved[role][menu];
    });
  });
  return base;
}
function savePermissions(perms) { localStorage.setItem('ppstudio_permissions', JSON.stringify(perms)); }

/* ════════════════════════════════════════
   UTILS
════════════════════════════════════════ */
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2200);
}

function roleBadgeHtml(role) {
  const cls = { '관리자':'rb-관리자','디자이너':'rb-디자이너','현장시공팀':'rb-현장시공팀','재무팀장':'rb-재무팀장' };
  return `<span class="role-badge ${cls[role] || ''}">${esc(role)}</span>`;
}

/* ════════════════════════════════════════
   TAB SWITCHING
════════════════════════════════════════ */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function () {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    this.classList.add('active');
    document.getElementById('tab-' + this.dataset.tab).classList.add('active');
  });
});

/* ════════════════════════════════════════
   TAB 1 — EMPLOYEES
════════════════════════════════════════ */
function renderEmployees() {
  const users = loadUsers();
  const panel = document.getElementById('tab-employees');

  const cards = users.map(u => `
    <div class="emp-card" data-id="${esc(u.id)}">
      <div class="emp-avatar">${esc(u.name.charAt(0))}</div>
      <div class="emp-info">
        <div class="emp-name">${esc(u.name)}</div>
        <div class="emp-username">@${esc(u.username)}</div>
      </div>
      <div class="emp-badges">
        ${roleBadgeHtml(u.role)}
        <span class="status-badge ${u.active ? 'sb-active' : 'sb-inactive'}">
          <span class="status-dot"></span>${u.active ? '활성' : '비활성'}
        </span>
      </div>
    </div>
  `).join('');

  panel.innerHTML = `
    <div class="section-header">
      <div>
        <div class="section-title">직원 목록</div>
        <div class="section-sub">총 ${users.length}명 · 카드 클릭 시 수정 가능</div>
      </div>
      <button class="btn-primary" id="btn-add-emp">＋ 직원 추가</button>
    </div>
    <div class="emp-grid">${cards}</div>
  `;

  document.getElementById('btn-add-emp').addEventListener('click', () => openModal(null));
  panel.querySelectorAll('.emp-card').forEach(card => {
    card.addEventListener('click', function () { openModal(this.dataset.id); });
  });
}

/* ════════════════════════════════════════
   EMPLOYEE MODAL
════════════════════════════════════════ */
let editingId    = null;
let pwChangeOpen = false;

function openModal(userId) {
  editingId    = userId;
  pwChangeOpen = !userId;

  const users = loadUsers();
  const u     = userId ? users.find(x => x.id === userId) : null;
  const isAdmin = u?.username === 'admin';

  document.getElementById('modal-title').textContent = userId ? '직원 수정' : '직원 추가';

  const roleOpts = ROLES.map(r =>
    `<option value="${esc(r)}" ${(u?.role || '디자이너') === r ? 'selected' : ''}>${esc(r)}</option>`
  ).join('');

  const pwBlock = userId ? `
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <div class="pw-change-row">
        <span class="pw-change-label">비밀번호 변경하기</span>
        <label class="toggle-wrap">
          <input type="checkbox" id="pw-toggle">
          <div class="toggle-track"></div>
        </label>
      </div>
      <div id="pw-input-wrap" style="display:none;margin-top:8px;">
        <input class="form-input" id="f-password" type="password" placeholder="새 비밀번호 입력" />
      </div>
    </div>
  ` : `
    <div class="form-group">
      <label class="form-label">비밀번호 <span class="req">*</span></label>
      <input class="form-input" id="f-password" type="password" placeholder="비밀번호 입력" />
    </div>
  `;

  document.getElementById('modal-body').innerHTML = `
    <div class="form-group">
      <label class="form-label">이름 <span class="req">*</span></label>
      <input class="form-input" id="f-name" placeholder="예: 홍길동" value="${esc(u?.name || '')}" />
    </div>
    <div class="form-group">
      <label class="form-label">아이디 <span class="req">*</span></label>
      <input class="form-input" id="f-username" placeholder="영문 소문자 + 숫자"
        value="${esc(u?.username || '')}" ${isAdmin ? 'readonly' : ''} />
      <div class="form-hint">영문 소문자·숫자만 사용 가능 (공백 불가)</div>
    </div>
    ${pwBlock}
    <div class="form-group">
      <label class="form-label">역할 <span class="req">*</span></label>
      <select class="form-select" id="f-role" ${isAdmin ? 'disabled' : ''}>${roleOpts}</select>
    </div>
    <div class="form-group">
      <label class="form-label">계정 상태</label>
      <div class="status-toggle-row">
        <span class="status-toggle-text" id="status-text">${u?.active !== false ? '활성' : '비활성'}</span>
        <label class="toggle-wrap">
          <input type="checkbox" id="f-active" ${u?.active !== false ? 'checked' : ''} ${isAdmin ? 'disabled' : ''}>
          <div class="toggle-track"></div>
        </label>
      </div>
    </div>
  `;

  /* footer delete button */
  const footLeft = document.getElementById('modal-footer-left');
  footLeft.innerHTML = (userId && !isAdmin)
    ? `<button class="btn-danger" id="btn-del-emp">삭제</button>`
    : '';
  if (userId && !isAdmin) {
    document.getElementById('btn-del-emp').addEventListener('click', () => deleteEmployee(userId));
  }

  /* pw change toggle */
  if (userId) {
    document.getElementById('pw-toggle').addEventListener('change', function () {
      pwChangeOpen = this.checked;
      const wrap = document.getElementById('pw-input-wrap');
      wrap.style.display = this.checked ? '' : 'none';
      if (this.checked) document.getElementById('f-password')?.focus();
    });
  }

  /* status label sync */
  document.getElementById('f-active').addEventListener('change', function () {
    document.getElementById('status-text').textContent = this.checked ? '활성' : '비활성';
  });

  document.getElementById('emp-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('emp-modal').classList.remove('open');
  editingId    = null;
  pwChangeOpen = false;
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('emp-modal').addEventListener('click', function (e) {
  if (e.target === this) closeModal();
});

document.getElementById('modal-save').addEventListener('click', function () {
  const name     = document.getElementById('f-name')?.value.trim();
  const username = document.getElementById('f-username')?.value.trim();
  const roleEl   = document.getElementById('f-role');
  const role     = roleEl?.disabled
    ? loadUsers().find(u => u.id === editingId)?.role
    : roleEl?.value;
  const active   = document.getElementById('f-active')?.checked ?? true;

  if (!name)     { alert('이름을 입력해주세요.'); return; }
  if (!username) { alert('아이디를 입력해주세요.'); return; }
  if (!/^[a-z0-9]+$/.test(username)) { alert('아이디는 영문 소문자와 숫자만 사용 가능합니다.'); return; }

  const users = loadUsers();
  const dup   = users.find(u => u.username === username && u.id !== editingId);
  if (dup) { alert('이미 사용 중인 아이디입니다.'); return; }

  let password;
  if (!editingId) {
    password = document.getElementById('f-password')?.value;
    if (!password)       { alert('비밀번호를 입력해주세요.'); return; }
    if (password.length < 4) { alert('비밀번호는 4자 이상이어야 합니다.'); return; }
  } else {
    const existing = users.find(u => u.id === editingId);
    password = existing?.password;
    if (pwChangeOpen) {
      const np = document.getElementById('f-password')?.value;
      if (!np)         { alert('새 비밀번호를 입력해주세요.'); return; }
      if (np.length < 4) { alert('비밀번호는 4자 이상이어야 합니다.'); return; }
      password = np;
    }
  }

  if (editingId) {
    const idx = users.findIndex(u => u.id === editingId);
    if (idx !== -1) {
      users[idx] = { ...users[idx], name, username, password, role, active };
      const loggedIn = JSON.parse(localStorage.getItem('ppstudio_user') || 'null');
      if (loggedIn?.username === users[idx].username) {
        localStorage.setItem('ppstudio_user', JSON.stringify({ ...loggedIn, name, role }));
        document.getElementById('user-name').textContent   = name;
        document.getElementById('user-avatar').textContent = name.charAt(0);
      }
    }
  } else {
    users.push({ id: 'usr-' + Date.now(), username, password, name, role, active });
  }

  saveUsers(users);
  closeModal();
  renderEmployees();
  showToast(editingId ? '직원 정보가 수정되었습니다.' : '직원 계정이 추가되었습니다.');
});

function deleteEmployee(userId) {
  const users = loadUsers();
  const u     = users.find(x => x.id === userId);
  if (!confirm(`"${u?.name}" 계정을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
  saveUsers(users.filter(x => x.id !== userId));
  closeModal();
  renderEmployees();
  showToast('직원 계정이 삭제되었습니다.');
}

/* ════════════════════════════════════════
   TAB 2 — PERMISSIONS
════════════════════════════════════════ */
function renderPermissions() {
  const perms = loadPermissions();
  const panel = document.getElementById('tab-permissions');

  const menuHeaders = MENUS.map(m => `<th>${esc(m)}</th>`).join('');

  const adminRow = `
    <tr class="admin-perm-row">
      <td class="role-cell">${roleBadgeHtml('관리자')}</td>
      <td colspan="${MENUS.length}" style="padding:14px 20px;text-align:center;">
        <span class="admin-all-badge">🔒 모든 권한 (변경 불가)</span>
      </td>
    </tr>
  `;

  const roleRows = EDITABLE_ROLES.map(role => {
    const cells = MENUS.map(menu => {
      const p = perms[role][menu] || { read: false, write: false, delete: false };
      const toggles = PERM_TYPES.map(pt => `
        <div class="perm-row">
          <span class="perm-row-label">${PERM_KO[pt]}</span>
          <label class="toggle-wrap">
            <input type="checkbox" data-role="${esc(role)}" data-menu="${esc(menu)}" data-perm="${pt}" ${p[pt] ? 'checked' : ''}>
            <div class="toggle-track"></div>
          </label>
        </div>
      `).join('');
      return `<td class="perm-cell"><div class="perm-cell-inner">${toggles}</div></td>`;
    }).join('');

    return `
      <tr>
        <td class="role-cell">${roleBadgeHtml(role)}</td>
        ${cells}
      </tr>
    `;
  }).join('');

  panel.innerHTML = `
    <div class="perm-card">
      <div class="perm-card-header">
        <div>
          <div class="perm-card-title">역할별 권한</div>
          <div class="perm-card-sub">각 역할의 메뉴별 접근·쓰기·삭제 권한을 설정합니다.</div>
        </div>
        <button class="btn-save-perm" id="btn-save-perm">저장</button>
      </div>
      <div class="perm-table-wrap">
        <table class="perm-table">
          <thead>
            <tr>
              <th style="min-width:110px;">역할</th>
              ${menuHeaders}
            </tr>
          </thead>
          <tbody>
            ${adminRow}
            ${roleRows}
          </tbody>
        </table>
      </div>
    </div>
  `;

  document.getElementById('btn-save-perm').addEventListener('click', () => {
    const perms = loadPermissions();
    document.querySelectorAll('.perm-cell input[type="checkbox"]').forEach(cb => {
      const { role, menu, perm } = cb.dataset;
      if (!perms[role])       perms[role] = {};
      if (!perms[role][menu]) perms[role][menu] = { read: false, write: false, delete: false };
      perms[role][menu][perm] = cb.checked;
    });
    savePermissions(perms);
    showToast('권한 설정이 저장되었습니다.');
  });
}

/* ════════════════════════════════════════
   KEYBOARD
════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

/* ════════════════════════════════════════
   BOOT
════════════════════════════════════════ */
if (!localStorage.getItem('ppstudio_users')) saveUsers(INIT_USERS);
renderEmployees();
renderPermissions();
</script>
</body>
</html>
